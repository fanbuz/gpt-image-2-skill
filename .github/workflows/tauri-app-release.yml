name: Tauri App Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing or new GitHub Release tag, for example v0.2.5
        required: true
      release_draft:
        description: Create or update a draft release
        required: true
        type: boolean
        default: false
      prerelease:
        description: Mark the release as prerelease
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_DRAFT: ${{ inputs.release_draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
            exit 0
          fi

          flags=()
          if [ "$RELEASE_DRAFT" = "true" ]; then
            flags+=(--draft)
          fi
          if [ "$PRERELEASE" = "true" ]; then
            flags+=(--prerelease)
          fi

          gh release create "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --title "GPT Image 2 $RELEASE_TAG" \
            --notes "Desktop app installers for GPT Image 2." \
            "${flags[@]}"

  build-app:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app,dmg
          - platform: ubuntu-22.04
            rust_target: ""
            args: --bundles appimage,deb,rpm
          - platform: windows-latest
            rust_target: ""
            args: --bundles nsis

    runs-on: ${{ matrix.platform }}
    env:
      APPLE_TEAM_ID: 3VT538F8B6

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: apps/gpt-image-2-app/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install frontend dependencies
        run: npm ci --prefix apps/gpt-image-2-app

      - name: Import Apple Developer certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_ID="$(security find-identity -v -p codesigning build.keychain | awk '/Developer ID Application/ { print $2; exit }')"
          if [ -z "$CERT_ID" ]; then
            echo "Developer ID Application certificate was not imported."
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Write Apple API key
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Prepare bundled CLI sidecar
        env:
          GPT_IMAGE_2_APP_TARGET: ${{ matrix.rust_target }}
        run: npm --prefix apps/gpt-image-2-app run prepare:sidecar

      - name: Build Tauri app
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: npm --prefix apps/gpt-image-2-app run tauri -- build ${{ matrix.args }} --ci

      - name: Notarize DMG files
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: |
          shopt -s nullglob
          for dmg in target/release/bundle/dmg/*.dmg target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg; do
            echo "Notarizing $dmg"
            xcrun notarytool submit "$dmg" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
            spctl -a -vvv -t open --context context:primary-signature "$dmg"
          done

      - name: Upload app installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          shopt -s globstar nullglob
          artifacts=(
            target/**/release/bundle/dmg/*.dmg
            target/**/release/bundle/nsis/*.exe
            target/**/release/bundle/appimage/*.AppImage
            target/**/release/bundle/deb/*.deb
            target/**/release/bundle/rpm/*.rpm
          )

          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No app installers found."
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${artifacts[@]}" --repo "${{ github.repository }}" --clobber
