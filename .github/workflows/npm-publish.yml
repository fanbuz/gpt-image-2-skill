name: Publish npm Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag such as v0.2.0
        required: true
        type: string
      dry_run:
        description: Validate npm packaging without publishing
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  actions: write

jobs:
  publish-npm:
    runs-on: ubuntu-24.04
    env:
      TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'true' || 'false' }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || env.TAG_NAME }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .release-assets
          gh release download "$TAG_NAME" --dir .release-assets
      - name: Build npm matrix
        run: |
          node scripts/npm/build-matrix.mjs --release-dir .release-assets --version "${TAG_NAME#v}"
      - name: Dry run npm publish
        if: ${{ env.DRY_RUN == 'true' }}
        run: |
          for package_dir in \
            packages/npm/gpt-image-2-skill-darwin-arm64 \
            packages/npm/gpt-image-2-skill-darwin-x64 \
            packages/npm/gpt-image-2-skill-linux-arm64-gnu \
            packages/npm/gpt-image-2-skill-linux-x64-gnu \
            packages/npm/gpt-image-2-skill-windows-arm64-msvc \
            packages/npm/gpt-image-2-skill-windows-x64-msvc
          do
            npm publish "$package_dir" --access public --dry-run
          done
          npm publish packages/npm/gpt-image-2-skill --access public --dry-run
      - name: Publish platform packages
        if: ${{ env.DRY_RUN != 'true' }}
        run: |
          for package_dir in \
            packages/npm/gpt-image-2-skill-darwin-arm64 \
            packages/npm/gpt-image-2-skill-darwin-x64 \
            packages/npm/gpt-image-2-skill-linux-arm64-gnu \
            packages/npm/gpt-image-2-skill-linux-x64-gnu \
            packages/npm/gpt-image-2-skill-windows-arm64-msvc \
            packages/npm/gpt-image-2-skill-windows-x64-msvc
          do
            npm publish "$package_dir" --access public --provenance
          done
      - name: Publish root package
        if: ${{ env.DRY_RUN != 'true' }}
        run: npm publish packages/npm/gpt-image-2-skill --access public --provenance
      - name: Dispatch post release verify
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh workflow run "Post Release Verify" --repo "${{ github.repository }}" -f version="${TAG_NAME#v}" -f verify_desktop_cask=false
