[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# Keep the generated release workflow custom-patched for Windows ARM WiX setup.
allow-dirty = ["ci"]
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew", "msi"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "aarch64-pc-windows-msvc", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# Installer completion message
install-success-msg = "gpt-image-2-skill is ready."
# Publish Homebrew formulae
publish-jobs = ["homebrew"]
# Homebrew tap repository
tap = "Wangnov/homebrew-tap"

[dist.dependencies.chocolatey]
wixtoolset = { version = "3.14.1.20250415", targets = ["aarch64-pc-windows-msvc"] }

[dist.github-custom-runners]
x86_64-unknown-linux-gnu = "ubuntu-24.04"
x86_64-unknown-linux-musl = "ubuntu-24.04"
aarch64-unknown-linux-gnu = "ubuntu-24.04-arm"
x86_64-apple-darwin = "macos-15-intel"
aarch64-apple-darwin = "macos-15"
x86_64-pc-windows-msvc = "windows-2025"
aarch64-pc-windows-msvc = "windows-11-arm"
